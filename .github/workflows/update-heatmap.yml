name: Update Contribution Heatmap

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-heatmap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch Contributions & Render Heatmap SVG
        run: |
          python scripts/fetch_contributions.py
          python scripts/render_heatmap_svg.py

      - name: Commit and Push Updated Assets
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contrib-heatmap.svg data/contributions.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update contribution heatmap [skip ci]" && git push)
